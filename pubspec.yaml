name: tug_of_war_mathematics
description: A competitive math game for children — Tug of War Mathematics
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State management — no code generation needed
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Local storage — simple, no generator needed
  shared_preferences: ^2.2.3

  # Audio
  audioplayers: ^6.0.0

  # Animations
  confetti: ^0.7.0
  flutter_animate: ^4.5.0

  # Icons
  cupertino_icons: ^1.0.8
  just_audio: ^0.10.5
  google_mobile_ads: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
